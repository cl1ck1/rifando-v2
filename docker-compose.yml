services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rifando
      POSTGRES_USER: rifando
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rifando_dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rifando"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  api-server:
    build:
      context: .
      target: api-server
    ports:
      - "3001:3000"
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://rifando:${POSTGRES_PASSWORD:-rifando_dev}@postgres:5432/rifando
      NODE_ENV: production
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: rifando
      PUBLIC_OBJECT_SEARCH_PATHS: uploads
      PRIVATE_OBJECT_DIR: private
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  rifeiro-app:
    build:
      context: .
      target: rifeiro-app
    ports:
      - "8081:80"
    depends_on:
      - api-server

volumes:
  pgdata:
  miniodata:
