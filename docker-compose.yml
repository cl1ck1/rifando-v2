version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rifando
      POSTGRES_USER: rifando
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rifando_dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rifando"]
      interval: 5s
      timeout: 5s
      retries: 5

  api-server:
    build:
      context: .
      target: api-server
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://rifando:${POSTGRES_PASSWORD:-rifando_dev}@postgres:5432/rifando
      NODE_ENV: production
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      S3_BUCKET: ${S3_BUCKET:-}
      PUBLIC_OBJECT_SEARCH_PATHS: ${PUBLIC_OBJECT_SEARCH_PATHS:-}
      PRIVATE_OBJECT_DIR: ${PRIVATE_OBJECT_DIR:-}
    depends_on:
      postgres:
        condition: service_healthy

  rifeiro-app:
    build:
      context: .
      target: rifeiro-app
    ports:
      - "8080:80"
    depends_on:
      - api-server

volumes:
  pgdata:
