openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.2.0
  description: Sou Rifeiro API - Plataforma para vendedores ambulantes e representantes comerciais
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: dashboard
    description: Dashboard and analytics
  - name: vendas
    description: Sales management
  - name: clientes
    description: Customer CRM
  - name: parcelas
    description: Installment payment tracking
  - name: produtos
    description: Product catalog management
  - name: categorias
    description: Product categories
  - name: configuracoes
    description: Account settings
  - name: catalogo-publico
    description: Public virtual catalog (no auth)

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Catalogo Publico ───────────────────────────────
  /catalogo/{slug}:
    get:
      operationId: getCatalogoPublico
      tags: [catalogo-publico]
      summary: Get public virtual catalog by slug (no auth)
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Catalog data with store info, categories, and products
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogoPublicoResponse"
        "404":
          description: Store not found or catalog disabled
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string

  # ── Dashboard ──────────────────────────────────────
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Dashboard KPI summary
      responses:
        "200":
          description: Dashboard summary data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/revenue-by-month:
    get:
      operationId: getRevenueByMonth
      tags: [dashboard]
      summary: Monthly revenue for charts
      responses:
        "200":
          description: Revenue grouped by month
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MonthlyRevenue"

  /dashboard/top-customers:
    get:
      operationId: getTopCustomers
      tags: [dashboard]
      summary: Top customers by total purchases
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 5
      responses:
        "200":
          description: Top customers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TopCustomer"

  /dashboard/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Recent activity feed
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Recent activity items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /dashboard/parcelas-atrasadas:
    get:
      operationId: getParcelasAtrasadas
      tags: [dashboard]
      summary: Overdue installments summary
      responses:
        "200":
          description: Overdue installments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ParcelaAtrasadaItem"

  # ── Vendas (Sales) ────────────────────────────────
  /vendas:
    get:
      operationId: listVendas
      tags: [vendas]
      summary: List all sales
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pendente, parcial, quitada, cancelada]
        - name: clienteId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of sales
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Venda"
    post:
      operationId: createVenda
      tags: [vendas]
      summary: Create a new sale with items and installments
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVendaBody"
      responses:
        "201":
          description: Created sale
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Venda"

  /vendas/{id}:
    get:
      operationId: getVenda
      tags: [vendas]
      summary: Get a single sale with items and installments
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Sale details with items and parcelas
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VendaDetail"
        "404":
          description: Not found
    patch:
      operationId: updateVenda
      tags: [vendas]
      summary: Update a sale
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateVendaBody"
      responses:
        "200":
          description: Updated sale
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Venda"
        "404":
          description: Not found
    delete:
      operationId: deleteVenda
      tags: [vendas]
      summary: Delete a sale
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Clientes (Customers) ───────────────────────────
  /clientes:
    get:
      operationId: listClientes
      tags: [clientes]
      summary: List all customers
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [ativo, inativo]
        - name: cidade
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of customers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Cliente"
    post:
      operationId: createCliente
      tags: [clientes]
      summary: Create a new customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClienteBody"
      responses:
        "201":
          description: Created customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cliente"

  /clientes/{id}:
    get:
      operationId: getCliente
      tags: [clientes]
      summary: Get a single customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Customer details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cliente"
        "404":
          description: Not found
    patch:
      operationId: updateCliente
      tags: [clientes]
      summary: Update a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateClienteBody"
      responses:
        "200":
          description: Updated customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cliente"
        "404":
          description: Not found
    delete:
      operationId: deleteCliente
      tags: [clientes]
      summary: Delete a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /clientes/{id}/history:
    get:
      operationId: getClienteHistory
      tags: [clientes]
      summary: Customer purchase and payment history
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Customer history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClienteHistory"

  # ── Parcelas (Installments) ──────────────────────────
  /parcelas:
    get:
      operationId: listParcelas
      tags: [parcelas]
      summary: List all installments
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pendente, paga, atrasada, cancelada]
        - name: clienteId
          in: query
          schema:
            type: integer
        - name: vendaId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of installments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Parcela"

  /parcelas/{id}:
    get:
      operationId: getParcela
      tags: [parcelas]
      summary: Get a single installment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Installment details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Parcela"
        "404":
          description: Not found
    patch:
      operationId: updateParcela
      tags: [parcelas]
      summary: Update installment (mark as paid, change date, etc.)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateParcelaBody"
      responses:
        "200":
          description: Updated installment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Parcela"
        "404":
          description: Not found

  # ── Produtos (Products) ────────────────────────────
  /produtos:
    get:
      operationId: listProdutos
      tags: [produtos]
      summary: List all products
      parameters:
        - name: categoriaId
          in: query
          schema:
            type: integer
        - name: ativo
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Produto"
    post:
      operationId: createProduto
      tags: [produtos]
      summary: Create a new product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProdutoBody"
      responses:
        "201":
          description: Created product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Produto"

  /produtos/{id}:
    get:
      operationId: getProduto
      tags: [produtos]
      summary: Get a single product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Produto"
        "404":
          description: Not found
    patch:
      operationId: updateProduto
      tags: [produtos]
      summary: Update a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProdutoBody"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Produto"
        "404":
          description: Not found
    delete:
      operationId: deleteProduto
      tags: [produtos]
      summary: Delete a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Categorias ─────────────────────────────────────
  /categorias:
    get:
      operationId: listCategorias
      tags: [categorias]
      summary: List all categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Categoria"
    post:
      operationId: createCategoria
      tags: [categorias]
      summary: Create a new category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoriaBody"
      responses:
        "201":
          description: Created category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Categoria"

  /categorias/{id}:
    delete:
      operationId: deleteCategoria
      tags: [categorias]
      summary: Delete a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Configuracoes (Settings) ───────────────────────
  /configuracoes:
    get:
      operationId: getConfiguracoes
      tags: [configuracoes]
      summary: Get account settings
      responses:
        "200":
          description: Account settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Configuracoes"
    put:
      operationId: updateConfiguracoes
      tags: [configuracoes]
      summary: Update account settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateConfiguracoesBody"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Configuracoes"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # ── Dashboard Schemas ──────────────────────────────
    DashboardSummary:
      type: object
      required: [totalVendas, totalRecebido, totalPendente, totalClientes, vendasMes, parcelasAtrasadas]
      properties:
        totalVendas:
          type: number
        totalRecebido:
          type: number
        totalPendente:
          type: number
        totalClientes:
          type: integer
        vendasMes:
          type: integer
        parcelasAtrasadas:
          type: integer

    MonthlyRevenue:
      type: object
      required: [month, vendas, recebido]
      properties:
        month:
          type: string
        vendas:
          type: number
        recebido:
          type: number

    TopCustomer:
      type: object
      required: [id, nome, totalCompras, comprasCount]
      properties:
        id:
          type: integer
        nome:
          type: string
        totalCompras:
          type: number
        comprasCount:
          type: integer
        telefone:
          type: ["string", "null"]
        cidade:
          type: ["string", "null"]

    ActivityItem:
      type: object
      required: [id, type, description, createdAt]
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [venda, pagamento, cliente, produto]
        description:
          type: string
        createdAt:
          type: string
          format: date-time

    ParcelaAtrasadaItem:
      type: object
      required: [id, clienteNome, clienteTelefone, valor, dataVencimento, diasAtraso]
      properties:
        id:
          type: integer
        vendaId:
          type: integer
        clienteNome:
          type: string
        clienteTelefone:
          type: ["string", "null"]
        valor:
          type: number
        dataVencimento:
          type: string
        diasAtraso:
          type: integer
        parcela:
          type: integer
        totalParcelas:
          type: integer

    # ── Venda Schemas ─────────────────────────────────
    Venda:
      type: object
      required: [id, clienteId, clienteNome, valorTotal, valorFinal, formaPagamento, numeroParcelas, status, createdAt]
      properties:
        id:
          type: integer
        clienteId:
          type: integer
        clienteNome:
          type: string
        valorTotal:
          type: number
        desconto:
          type: number
        valorFinal:
          type: number
        formaPagamento:
          type: string
          enum: [avista, parcelado]
        numeroParcelas:
          type: integer
        status:
          type: string
          enum: [pendente, parcial, quitada, cancelada]
        observacoes:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    VendaItem:
      type: object
      required: [id, produtoId, produtoNome, quantidade, precoUnitario, subtotal]
      properties:
        id:
          type: integer
        produtoId:
          type: integer
        produtoNome:
          type: string
        quantidade:
          type: integer
        precoUnitario:
          type: number
        subtotal:
          type: number

    VendaDetail:
      type: object
      required: [venda, itens, parcelas]
      properties:
        venda:
          $ref: "#/components/schemas/Venda"
        itens:
          type: array
          items:
            $ref: "#/components/schemas/VendaItem"
        parcelas:
          type: array
          items:
            $ref: "#/components/schemas/Parcela"

    CreateVendaBody:
      type: object
      required: [clienteId, itens, formaPagamento, numeroParcelas]
      properties:
        clienteId:
          type: integer
        desconto:
          type: number
        formaPagamento:
          type: string
          enum: [avista, parcelado]
        numeroParcelas:
          type: integer
        observacoes:
          type: string
        itens:
          type: array
          items:
            type: object
            required: [produtoId, quantidade, precoUnitario]
            properties:
              produtoId:
                type: integer
              quantidade:
                type: integer
              precoUnitario:
                type: number

    UpdateVendaBody:
      type: object
      properties:
        status:
          type: string
          enum: [pendente, parcial, quitada, cancelada]
        observacoes:
          type: string

    # ── Cliente Schemas ────────────────────────────────
    Cliente:
      type: object
      required: [id, nome, telefone, status, totalCompras, createdAt]
      properties:
        id:
          type: integer
        nome:
          type: string
        telefone:
          type: string
        email:
          type: ["string", "null"]
        cpf:
          type: ["string", "null"]
        endereco:
          type: ["string", "null"]
        bairro:
          type: ["string", "null"]
        cidade:
          type: ["string", "null"]
        estado:
          type: ["string", "null"]
        referencia:
          type: ["string", "null"]
        observacoes:
          type: ["string", "null"]
        status:
          type: string
          enum: [ativo, inativo]
        totalCompras:
          type: number
        createdAt:
          type: string
          format: date-time

    CreateClienteBody:
      type: object
      required: [nome, telefone]
      properties:
        nome:
          type: string
        telefone:
          type: string
        email:
          type: string
        cpf:
          type: string
        endereco:
          type: string
        bairro:
          type: string
        cidade:
          type: string
        estado:
          type: string
        referencia:
          type: string
        observacoes:
          type: string
        status:
          type: string
          enum: [ativo, inativo]

    UpdateClienteBody:
      type: object
      properties:
        nome:
          type: string
        telefone:
          type: string
        email:
          type: string
        cpf:
          type: string
        endereco:
          type: string
        bairro:
          type: string
        cidade:
          type: string
        estado:
          type: string
        referencia:
          type: string
        observacoes:
          type: string
        status:
          type: string
          enum: [ativo, inativo]

    ClienteHistory:
      type: object
      required: [cliente, vendas, parcelas]
      properties:
        cliente:
          $ref: "#/components/schemas/Cliente"
        vendas:
          type: array
          items:
            $ref: "#/components/schemas/Venda"
        parcelas:
          type: array
          items:
            $ref: "#/components/schemas/Parcela"

    # ── Parcela Schemas ──────────────────────────────
    Parcela:
      type: object
      required: [id, vendaId, clienteId, clienteNome, numero, valor, dataVencimento, status, createdAt]
      properties:
        id:
          type: integer
        vendaId:
          type: integer
        clienteId:
          type: integer
        clienteNome:
          type: string
        clienteTelefone:
          type: ["string", "null"]
        numero:
          type: integer
        totalParcelas:
          type: integer
        valor:
          type: number
        dataVencimento:
          type: string
        dataPagamento:
          type: ["string", "null"]
        metodoPagamento:
          type: ["string", "null"]
          enum: [pix, dinheiro, cartao, promissoria, null]
        status:
          type: string
          enum: [pendente, paga, atrasada, cancelada]
        createdAt:
          type: string
          format: date-time

    UpdateParcelaBody:
      type: object
      properties:
        status:
          type: string
          enum: [pendente, paga, atrasada, cancelada]
        dataPagamento:
          type: string
        metodoPagamento:
          type: string
          enum: [pix, dinheiro, cartao, promissoria]
        dataVencimento:
          type: string
        valor:
          type: number

    # ── Produto Schemas ────────────────────────────────
    Produto:
      type: object
      required: [id, nome, precoVenda, ativo, createdAt]
      properties:
        id:
          type: integer
        nome:
          type: string
        descricao:
          type: ["string", "null"]
        precoCusto:
          type: ["number", "null"]
        precoVenda:
          type: number
        imagemUrl:
          type: ["string", "null"]
        categoriaId:
          type: ["integer", "null"]
        categoriaNome:
          type: ["string", "null"]
        estoque:
          type: integer
        ativo:
          type: boolean
        createdAt:
          type: string
          format: date-time

    CreateProdutoBody:
      type: object
      required: [nome, precoVenda]
      properties:
        nome:
          type: string
        descricao:
          type: string
        precoCusto:
          type: number
        precoVenda:
          type: number
        imagemUrl:
          type: string
        categoriaId:
          type: integer
        estoque:
          type: integer
        ativo:
          type: boolean

    UpdateProdutoBody:
      type: object
      properties:
        nome:
          type: string
        descricao:
          type: string
        precoCusto:
          type: number
        precoVenda:
          type: number
        imagemUrl:
          type: string
        categoriaId:
          type: integer
        estoque:
          type: integer
        ativo:
          type: boolean

    # ── Categoria Schemas ──────────────────────────────
    Categoria:
      type: object
      required: [id, nome]
      properties:
        id:
          type: integer
        nome:
          type: string
        createdAt:
          type: string
          format: date-time

    CreateCategoriaBody:
      type: object
      required: [nome]
      properties:
        nome:
          type: string

    # ── Configuracoes Schemas ──────────────────────────
    Configuracoes:
      type: object
      required: [id]
      properties:
        id:
          type: integer
        nomeNegocio:
          type: ["string", "null"]
        telefoneWhatsapp:
          type: ["string", "null"]
        logoUrl:
          type: ["string", "null"]
        catalogoSlug:
          type: ["string", "null"]
        catalogoAtivo:
          type: boolean
        cidade:
          type: ["string", "null"]
        estado:
          type: ["string", "null"]
        chavePix:
          type: ["string", "null"]
